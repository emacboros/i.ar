---
# inventory/hosts.yml
# ────────────────────────────────────────────────────────────
# 4 hosts: 3 cloud VPS + 1 local workstation (sophon).
# Groups: cloud, local, ollama_hosts, proxy, ai_playground, frigate_hosts.
# ────────────────────────────────────────────────────────────

all:
  children:
    cloud:
      hosts:
        daftpunk:
          ansible_user: root
        rammstein:
          ansible_user: root
        greenday:
          ansible_user: root
    local:
      hosts:
        sophon:
          ansible_user: root

    # ── Functional groups (hosts can belong to multiple) ────
    proxy:
      hosts:
        rammstein:
    ai_playground:
      hosts:
        greenday:
    ollama_hosts:
      hosts:
        daftpunk:
        sophon:
    frigate_hosts:
      hosts:
        sophon:
