---
# playbooks/wireguard.yml — WireGuard only (re-keying or mesh changes).
# Usage: ansible-playbook playbooks/wireguard.yml --vault-password-file .vault_pass
#
# CRITICAL: The hub (rammstein) must be configured and restarted BEFORE
# any spokes. This is enforced with two plays:
#   Play 1: hub only — config is written and handlers flushed immediately
#   Play 2: all remaining hosts — spokes connect to the already-updated hub
# This prevents spoke lockout when the hub config changes.

- name: Configure WireGuard hub first (prevents spoke lockout)
  hosts: "{{ wg_hub | default('rammstein') }}"
  roles:
    - wireguard

- name: Configure WireGuard spokes
  hosts: all
  serial: 1
  roles:
    - role: wireguard
      when: inventory_hostname != wg_hub