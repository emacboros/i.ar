---
# roles/podman/tasks/main.yml
# Installs Podman and Podman Compose on hosts that need it.
# Used on: greenday (AI playground), sophon (local, Frigate + Ollama GPU).
# Cloud hosts run AlmaLinux 10 (need EPEL); local hosts run Fedora 44 (do not).

# ── Install EPEL (AlmaLinux/RHEL only, not Fedora) ─────────
- name: Install EPEL
  dnf:
    name:
      - epel-release
    state: present
  when: "'cloud' in group_names"

# ── Install Podman ─────────────────────────────────────────
- name: Install Podman
  dnf:
    name:
      - podman
      - podman-compose
    state: present

# ── Enable Podman ──────────────────────────────────────────
- name: Enable and start Podman
  service:
    name: podman
    state: started
    enabled: true
