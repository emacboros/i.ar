---
# roles/ollama/defaults/main.yml
# Ollama defaults — overridden by group_vars/all.yml and host_vars in practice.

# Set to a specific version (e.g. "0.5.1") to pin, or leave empty for latest.
ollama_version: ""
ollama_port: 11434
ollama_install_dir: "/usr/local/bin"
ollama_models_dir: "/usr/share/ollama"
ollama_user: ollama
ollama_listen: "0.0.0.0"
ollama_gpu: false
ollama_models: []