---
# roles/ollama/tasks/main.yml
# Installs Ollama and pulls specified models.
# Runs on: daftpunk (cloud, AlmaLinux, CPU-only), sophon (local, Fedora, GPU)
# GPU driver installation is handled by the nvidia role, not here.

# ── Create ollama user ──────────────────────────────────────
- name: Create ollama user
  user:
    name: "{{ ollama_user }}"
    system: true
    create_home: false
    shell: /sbin/nologin

# ── Create models directory ─────────────────────────────────
- name: Create models directory
  file:
    path: "{{ ollama_models_dir }}"
    state: directory
    owner: "{{ ollama_user }}"
    group: "{{ ollama_user }}"
    mode: '0755'

# ── Pre-flight: check NVIDIA GPU status (GPU hosts only) ───
# The Ollama install.sh script tries to install CUDA drivers itself when
# it detects an NVIDIA GPU via lspci but nvidia-smi is not yet available.
# On Fedora 44 (dnf5), this fails because `dnf config-manager --add-repo`
# was removed. The nvidia role handles driver installation via RPM Fusion,
# but requires a reboot after the first install. We skip the Ollama install
# until nvidia-smi is available to avoid the script's broken CUDA path.
- name: Check if nvidia-smi is available (GPU hosts)
  command: nvidia-smi --query-gpu=name --format=csv,noheader
  register: ollama_nvidia_check
  changed_when: false
  failed_when: false
  when: ollama_gpu | bool

- name: Skip Ollama install until NVIDIA driver is loaded
  debug:
    msg: |
      ════════════════════════════════════════════════════════════
      NVIDIA driver installed but not yet loaded (needs reboot).
      Skipping Ollama install to avoid the install script's broken
      `dnf config-manager --add-repo` path on Fedora 44.
      Reboot and re-run the playbook to complete Ollama setup.
      ════════════════════════════════════════════════════════════
  when:
    - ollama_gpu | bool
    - ollama_nvidia_check.rc | default(0) != 0

# ── Install Ollama ──────────────────────────────────────────
# The official install.sh downloads the binary from ollama.com/download.
# When nvidia-smi is available, the script detects it and skips its
# own CUDA driver installation — exactly what we want, since the nvidia
# role handles that via RPM Fusion.
#
# OLLAMA_VERSION must be empty for the latest release, or a specific
# version string (e.g. "0.5.1"). The value "latest" causes a 404.
- name: Download and install Ollama
  shell: |
    curl -fsSL https://ollama.com/install.sh | sh
  args:
    creates: "{{ ollama_install_dir }}/ollama"
  environment:
    OLLAMA_VERSION: "{{ ollama_version | default('') }}"
  when: >
    not (ollama_gpu | bool)
    or (ollama_nvidia_check.rc | default(0)) == 0

# ── Configure Ollama service ───────────────────────────────
- name: Create systemd override directory
  file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: >
    not (ollama_gpu | bool)
    or (ollama_nvidia_check.rc | default(0)) == 0

- name: Create Ollama systemd service
  template:
    src: ollama.service.j2
    dest: /etc/systemd/system/ollama.service
    owner: root
    group: root
    mode: '0644'
  notify: restart ollama
  when: >
    not (ollama_gpu | bool)
    or (ollama_nvidia_check.rc | default(0)) == 0

- name: Create Ollama environment override
  copy:
    dest: /etc/systemd/system/ollama.service.d/override.conf
    content: |
      [Service]
      Environment="OLLAMA_HOST={{ ollama_listen }}:{{ ollama_port }}"
      Environment="OLLAMA_MODELS={{ ollama_models_dir }}"
    owner: root
    group: root
    mode: '0644'
  notify: restart ollama
  when: >
    not (ollama_gpu | bool)
    or (ollama_nvidia_check.rc | default(0)) == 0

- name: Reload systemd
  systemd:
    daemon_reload: true
  notify: restart ollama
  when: >
    not (ollama_gpu | bool)
    or (ollama_nvidia_check.rc | default(0)) == 0

- name: Enable and start Ollama
  service:
    name: ollama
    state: started
    enabled: true
  when: >
    not (ollama_gpu | bool)
    or (ollama_nvidia_check.rc | default(0)) == 0

# ── Pull models ────────────────────────────────────────────
# Use full path because the ollama user has /sbin/nologin shell
# and Ansible's command module does not resolve PATH.
- name: Pull Ollama models
  command: "{{ ollama_install_dir }}/ollama pull {{ item }}"
  become: true
  become_user: "{{ ollama_user }}"
  environment:
    OLLAMA_HOST: "{{ ollama_listen }}:{{ ollama_port }}"
    OLLAMA_MODELS: "{{ ollama_models_dir }}"
  loop: "{{ ollama_models }}"
  changed_when: false
  async: 600
  poll: 30
  when: >
    not (ollama_gpu | bool)
    or (ollama_nvidia_check.rc | default(0)) == 0
