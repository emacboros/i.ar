---
# roles/nvidia/defaults/main.yml
# NVIDIA driver and container toolkit installation.
# Target: sophon (local, Fedora Workstation 44, NVIDIA GPU).

# ── NVIDIA driver ──────────────────────────────────────────
# Install from RPM Fusion (Fedora's standard method).
# 'akmod-nvidia' builds the kmod automatically for the running kernel.
nvidia_driver_packages:
  - akmod-nvidia
  - xorg-x11-drv-nvidia-cuda

# ── NVIDIA container toolkit ───────────────────────────────
nvidia_container_packages:
  - nvidia-container-toolkit

# ── Reboot handling ────────────────────────────────────────
# akmod-nvidia needs a reboot to load the kernel module.
# We don't reboot automatically — the operator does that.
# After reboot, re-run the playbook to continue past this role.
nvidia_reboot_required: false