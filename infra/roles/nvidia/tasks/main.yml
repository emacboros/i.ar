---
# roles/nvidia/tasks/main.yml
# Installs NVIDIA proprietary drivers and container toolkit on Fedora.
# Target: sophon (local, Fedora Workstation 44, NVIDIA GPU).
#
# Requires two playbook runs:
#   1st run: installs akmod-nvidia, builds kernel module, sets reboot flag
#   2nd run (after reboot): nvidia-smi works, configures container toolkit

# ── Check if NVIDIA driver is already loaded ────────────────
- name: Check if nvidia-smi is available
  command: nvidia-smi --query-gpu=name --format=csv,noheader
  register: nvidia_check
  changed_when: false
  failed_when: false

- name: Set nvidia driver status
  set_fact:
    nvidia_driver_loaded: "{{ nvidia_check.rc == 0 }}"

# ── Install RPM Fusion repositories ────────────────────────
- name: Enable RPM Fusion nonfree repository
  dnf:
    name:
      - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  when: not nvidia_driver_loaded | bool

# ── Install NVIDIA driver ───────────────────────────────────
- name: Install NVIDIA driver (akmod + CUDA)
  dnf:
    name: "{{ nvidia_driver_packages }}"
    state: present
  when: not nvidia_driver_loaded | bool
  notify: rebuild initramfs

# ── Wait for akmod build to complete ───────────────────────
# akmod-nvidia triggers a background build of the kernel module.
# This can take 2-5 minutes. We wait for it before proceeding.
- name: Wait for akmod-nvidia build to complete
  shell: |
    # Wait for the akmod build to finish.
    # Exclude our own PID ($$) and its parent from the match to avoid
    # matching this very command string containing "akmods".
    while pgrep -f "akmods" | grep -v -E "^($$|$$PPID)$" > /dev/null 2>&1; do
      sleep 5
    done
    # Verify the kmod was actually built
    ls /lib/modules/$(uname -r)/extra/nvidia* 2>/dev/null || \
    ls /lib/modules/$(uname -r)/weak-updates/nvidia* 2>/dev/null
  register: akmod_build
  changed_when: false
  failed_when: false
  when: not nvidia_driver_loaded | bool

- name: Fail if akmod build failed
  fail:
    msg: |
      akmod-nvidia kernel module build appears to have failed.
      Check /var/log/akmods/ for build logs.
      A reboot may be needed if the running kernel doesn't match
      the installed kernel-headers.
  when:
    - not nvidia_driver_loaded | bool
    - akmod_build.rc != 0

- name: Notify that reboot is required
  debug:
    msg: |
      ════════════════════════════════════════════════════════════
      NVIDIA driver installed. A REBOOT IS REQUIRED to load the
      kernel module. After reboot, re-run this playbook to
      complete the setup (container toolkit + frigate).
      ════════════════════════════════════════════════════════════
  when: not nvidia_driver_loaded | bool

# ── If driver is loaded, install container toolkit ─────────
- name: Add NVIDIA container toolkit repository
  copy:
    dest: /etc/yum.repos.d/nvidia-container-toolkit.repo
    content: |
      [nvidia-container-toolkit]
      name=nvidia-container-toolkit
      baseurl=https://nvidia.github.io/libnvidia-container/stable/rpm/$basearch
      repo_gpgcheck=1
      gpgcheck=0
      enabled=1
      gpgkey=https://nvidia.github.io/libnvidia-container/gpgkey
    owner: root
    group: root
    mode: '0644'
  when: nvidia_driver_loaded | bool

- name: Install NVIDIA container toolkit
  dnf:
    name: "{{ nvidia_container_packages }}"
    state: present
    enablerepo: nvidia-container-toolkit
  when: nvidia_driver_loaded | bool

- name: Generate CDI specification for Podman
  command: nvidia-ctk cdi generate --output=/var/run/cdi/nvidia.yaml
  changed_when: false
  when: nvidia_driver_loaded | bool

- name: Enable nvidia-cdi-refresh service (auto-regenerates CDI spec on driver/kernel updates)
  service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - nvidia-cdi-refresh.path
    - nvidia-cdi-refresh.service
  when: nvidia_driver_loaded | bool

# ── Verify GPU is accessible ───────────────────────────────
- name: Verify NVIDIA GPU is accessible
  command: nvidia-smi --query-gpu=name --format=csv,noheader
  register: nvidia_verify
  changed_when: false
  failed_when: false
  when: nvidia_driver_loaded | bool

- name: Show GPU info
  debug:
    msg: "NVIDIA GPU detected: {{ nvidia_verify.stdout }}"
  when:
    - nvidia_driver_loaded | bool
    - nvidia_verify.rc == 0