---
# roles/wireguard/tasks/main.yml
# Sets up a full WireGuard mesh: every peer can reach every other peer.
# The proxy server (rammstein) acts as the hub — all peers tunnel through it.
# Cloud hosts run AlmaLinux 10; local hosts run Fedora Workstation 44.
#
# CRITICAL: The hub must be restarted BEFORE spokes to avoid lockout.
# This is enforced by the playbook's serial ordering (hub first via
# playbooks/wireguard.yml host ordering) plus meta: flush_handlers below.

# ── Install WireGuard ──────────────────────────────────────
# On Fedora, wireguard-tools includes wg-quick + the systemd unit.
# On AlmaLinux/RHEL, wireguard-tools is in EPEL and may not include
# the systemd unit — we create a fallback unit below if missing.
- name: Install WireGuard (wireguard-tools)
  dnf:
    name: wireguard-tools
    state: present
  # No more yoga exclusion — every host needs WG.

# ── Ensure systemd unit for wg-quick exists ────────────────
# On AlmaLinux the wg-quick@.service unit may not ship with the
# wireguard-tools package. Create it if missing.
- name: Check if wg-quick@.service systemd unit exists
  stat:
    path: "/usr/lib/systemd/system/wg-quick@.service"
  register: wg_systemd_unit

- name: Create wg-quick@.service systemd unit (AlmaLinux fallback)
  copy:
    dest: "/etc/systemd/system/wg-quick@.service"
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=WireGuard via wg-quick for %I
      After=network-online.target nss-lookup.target
      Wants=network-online.target nss-lookup.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/bin/wg-quick up %i
      ExecStop=/usr/bin/wg-quick down %i

      [Install]
      WantedBy=multi-user.target
  when: not wg_systemd_unit.stat.exists
  notify: reload systemd

# ── Generate wg0 config ────────────────────────────────────
- name: Create WireGuard config
  template:
    src: wg0.conf.j2
    dest: "/etc/wireguard/{{ wg_interface }}.conf"
    owner: root
    group: root
    mode: '0600'
  notify: restart wireguard

# ── Enable and start WireGuard ─────────────────────────────
- name: Enable wg-quick@{{ wg_interface }}
  service:
    name: "wg-quick@{{ wg_interface }}"
    state: started
    enabled: true

# ── On hub: flush handlers immediately so hub restarts ────
# BEFORE any spoke gets to its handler. This ensures the hub is
# back up with the new config before spokes try to reconnect.
- name: Flush handlers on hub (restart hub before spokes)
  meta: flush_handlers
  when: inventory_hostname == wg_hub

# ── Ensure IP forwarding is enabled (hub node only) ────────
- name: Enable IP forwarding on hub
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: true
  when: inventory_hostname == wg_hub

# ── Check if firewalld is available ────────────────────────
# The base role skips firewalld on some hosts (e.g. yoga laptop).
# We need to know if it's running before trying to configure it.
- name: Check if firewalld is running
  command: systemctl is-active firewalld
  register: firewalld_status
  changed_when: false
  failed_when: false

# ── Allow WireGuard through firewall ───────────────────────
- name: Allow WireGuard port through firewalld
  ansible.posix.firewalld:
    port: "{{ wg_port }}/udp"
    permanent: true
    state: enabled
    immediate: true
  when: firewalld_status.stdout == 'active'

- name: Allow forwarded traffic on hub firewalld
  ansible.posix.firewalld:
    masquerade: true
    zone: public
    permanent: true
    state: enabled
    immediate: true
  when: 
    - inventory_hostname == wg_hub
    - firewalld_status.stdout == 'active'

- name: Allow WG interface in firewalld
  ansible.posix.firewalld:
    interface: "{{ wg_interface }}"
    zone: trusted
    permanent: true
    state: enabled
    immediate: true
  when: firewalld_status.stdout == 'active'
